<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>The Ethical Bookkeeper — Build your own quote</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Sanchez:ital@0;1&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
  html, body {
    margin: 0; padding: 0;
    background: #f0eee9;
    font-family: 'Roboto', -apple-system, system-ui, sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
  }
  * { box-sizing: border-box; }
  button { font-family: inherit; }

  /* Desktop: center a phone in a soft page */
  .page {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    gap: 24px;
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(0,98,139,0.08), transparent 60%),
      radial-gradient(ellipse 60% 40% at 100% 100%, rgba(235,163,49,0.1), transparent 60%),
      #f0eee9;
  }
  .header {
    text-align: center;
    max-width: 500px;
  }
  .header h1 {
    font-family: 'Sanchez', Georgia, serif;
    font-size: 28px;
    color: #00628B;
    margin: 0 0 6px;
    letter-spacing: -0.3px;
  }
  .header p {
    color: rgba(60,50,40,0.65);
    font-size: 14px;
    margin: 0;
    line-height: 1.5;
  }
  .phone-wrap {
    /* The IOSDevice is 402x874. On desktop, show it 1:1. Scale down gracefully on small screens. */
    transform-origin: center center;
  }
  .footer {
    font-size: 12px;
    color: rgba(60,50,40,0.5);
    text-align: center;
    max-width: 400px;
  }
  .footer a { color: rgba(60,50,40,0.7); }

  /* Mobile: make the phone fill the screen, hide the wrapper chrome */
  @media (max-width: 600px) {
    .page {
      padding: 0;
      gap: 0;
      background: #000;
      min-height: 100vh;
      min-height: 100dvh;
      justify-content: flex-start;
    }
    .header, .footer { display: none; }
    .phone-wrap {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
    }
    /* Strip the bezel on mobile — user's phone IS the bezel */
    .phone-wrap > div {
      width: 100vw !important;
      height: 100vh !important;
      height: 100dvh !important;
      max-width: 100vw !important;
      max-height: 100dvh !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }
    /* Hide the iOS status bar and home indicator since the real phone shows those */
    .phone-wrap .ios-bezel-status,
    .phone-wrap .ios-bezel-home {
      display: none !important;
    }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="pricing-data.js?v=16"></script>
<meta name="ext-resource-dependency" content="teb-logo.jpg" data-resource-id="tebLogo"/>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#f0eee9">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#f0eee9"/>
    <g transform="translate(600 280)">
      <path d="M 0 120 L -150 -30 a 90 90 0 0 1 150 -70 a 90 90 0 0 1 150 70 z" fill="#00628B"/>
      <path d="M 0 120 L 150 -30 a 90 90 0 0 0 -150 -70 z" fill="#EBA331"/>
    </g>
    <text x="600" y="560" text-anchor="middle" font-family="Georgia, serif" font-size="56" fill="#00628B" font-weight="700">The Ethical</text>
    <text x="600" y="640" text-anchor="middle" font-family="Georgia, serif" font-size="84" fill="#00628B" font-weight="700">Bookkeeper</text>
    <rect x="320" y="700" width="560" height="4" fill="#EBA331"/>
  </svg>
</template>

<div class="page">
  <div class="header">
    <h1>Build your transparent quote</h1>
    <p>Takes about 3 minutes. No commitment — you'll see the price before we ever speak.</p>
  </div>
  <div id="root" class="phone-wrap"></div>
  <div class="footer">
    A prototype from <a href="https://theethicalbookkeeper.co.uk">The Ethical Bookkeeper</a>
  </div>
</div>

<script type="text/babel" src="ios-frame.jsx?v=16"></script>
<script type="text/babel" src="screens.jsx?v=16"></script>
<script type="text/babel" src="flow.jsx?v=16"></script>

<script type="text/babel">
function ClientFlow() {
  const [step, setStep] = React.useState(() => {
    const saved = parseInt(localStorage.getItem('teb-client-step') || '0', 10);
    return isNaN(saved) ? 0 : saved;
  });
  const [state, rawSet] = React.useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('teb-client-state') || 'null');
      if (saved) return saved;
    } catch {}
    return {
      entity: 'ltd',
      businessName: '',
      turnover: '',
      software: 'Xero',
      selected: {},
      name: '',
      email: '',
      phone: '',
    };
  });
  const setState = (patch) => rawSet(s => ({ ...s, ...patch }));
  React.useEffect(() => {
    localStorage.setItem('teb-client-step', String(step));
    localStorage.setItem('teb-client-state', JSON.stringify(state));
  }, [step, state]);
  const next = () => { setStep(s => Math.min(s + 1, 7)); window.scrollTo(0, 0); };
  const back = () => { setStep(s => Math.max(s - 1, 0)); window.scrollTo(0, 0); };
  const [thanksPath, setThanksPath] = React.useState('later');
  const goToThanks = (path) => { setThanksPath(path); setStep(7); window.scrollTo(0, 0); };
  const restart = () => {
    localStorage.removeItem('teb-client-step');
    localStorage.removeItem('teb-client-state');
    rawSet({}); setStep(0); setThanksPath('later');
  };

  const screens = [
    <Welcome onNext={next}/>,
    <BusinessStep state={state} setState={setState} onNext={next} onBack={back}/>,
    <ServicesStep state={state} setState={setState} onNext={next} onBack={back}/>,
    <ConfigureStep state={state} setState={setState} onNext={next} onBack={back}/>,
    <QuoteStep state={state} onNext={next} onBack={back}/>,
    <DetailsStep state={state} setState={setState} onNext={next} onBack={back}/>,
    <BookStep state={state} onBack={back} onConfirm={goToThanks}/>,
    <ThanksStep state={state} path={thanksPath} onRestart={restart}/>,
  ];
  return <IOSDevice>{screens[step]}</IOSDevice>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<ClientFlow/>);
</script>
</body>
</html>
